name: Build VDE SLiRP networking toolchain

on:
  workflow_dispatch:
    inputs:
      base_image:
        description: Build container and target glibc (must match the UML host)
        required: true
        default: amazonlinux:2023
        type: string
      release_tag:
        description: Optional release tag override
        required: false
        default: ""
        type: string

permissions:
  contents: read   # build job only; release job overrides to write

concurrency:
  group: vde-net-${{ inputs.base_image }}-${{ inputs.release_tag }}
  cancel-in-progress: false

env:
  # Pinned upstream commits, verified to build together against real libslirp.
  S2ARGV_EXECS_SHA: 066b3fdcf6bf32253338e250af2d655c736be387
  VDEPLUG4_SHA: a595069806e756b7597d3629d404848289b61d2c
  LIBVDESLIRP_SHA: b062bb47ceded1752f54c470ded4c040ed1695b8
  # virtualsquare/vdeplug_slirp is the current CMake-based plugin built on
  # libvdeslirp. Do not use github.com/rd235/vdeplug_slirp: it is the old,
  # deprecated, autotools-based plugin built on the equally deprecated
  # github.com/rd235/libslirp and has no CMakeLists.txt.
  VDEPLUG_SLIRP_SHA: 4801aac09da044b693954f71698dcfc26c6abd36
  # openSUSE/qemu-slirp is a real mirror of gitlab.freedesktop.org/slirp/libslirp.
  # Do not use github.com/utmapp/libslirp's "v4.9.1-release-mirror" tag: despite
  # the label it ships the old pre-SlirpConfig API and will not build against
  # libvdeslirp.
  LIBSLIRP_SHA: 2778e05cfe252ff2ece6846ec780c2a4f5be28e8

jobs:
  build:
    runs-on: ubuntu-24.04
    container:
      image: ${{ inputs.base_image }}
      options: --user root
    outputs:
      asset: ${{ steps.metadata.outputs.asset }}
      tag: ${{ steps.metadata.outputs.tag }}
      title: ${{ steps.metadata.outputs.title }}
    defaults:
      run:
        shell: bash
    env:
      BASE_IMAGE: ${{ inputs.base_image }}
      RELEASE_TAG: ${{ inputs.release_tag }}

    steps:
      - name: Reject unsupported host architectures
        run: |
          set -euo pipefail
          host_arch="$(uname -m)"
          if [[ "$host_arch" != "x86_64" ]]; then
            echo "::error title=Unsupported architecture::This toolchain targets x86_64 UML hosts only; detected $host_arch."
            exit 1
          fi

      - name: Install build dependencies
        run: |
          set -euo pipefail
          if command -v dnf >/dev/null 2>&1; then
            dnf install -y --allowerasing \
              gcc gcc-c++ make cmake automake autoconf libtool pkgconf-pkg-config \
              glib2-devel git tar gzip which meson ninja-build python3-pip
          elif command -v yum >/dev/null 2>&1; then
            yum install -y \
              gcc gcc-c++ make cmake automake autoconf libtool pkgconfig \
              glib2-devel git tar gzip which meson ninja-build python3-pip
          elif command -v apt-get >/dev/null 2>&1; then
            export DEBIAN_FRONTEND=noninteractive
            apt-get update
            apt-get install -y \
              build-essential cmake automake autoconf libtool pkg-config \
              libglib2.0-dev git tar gzip meson ninja-build python3-pip
          else
            echo "::error::No supported package manager found (need dnf, yum, or apt-get)."
            exit 1
          fi
          if ! command -v meson >/dev/null 2>&1; then
            python3 -m pip install --user meson ninja
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          fi
          # libvdeslirp requires CMake >= 3.25; some base images (e.g. AL2023)
          # package an older one. Get a current CMake from pip instead of
          # building it from source.
          if ! cmake --version | head -1 | grep -qE ' (3\.(2[5-9]|[3-9][0-9])|[4-9]\.)'; then
            python3 -m pip install --user "cmake>=3.25"
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          fi

      - name: Resolve release metadata
        id: metadata
        run: |
          set -euo pipefail
          base_slug="$(echo "$BASE_IMAGE" | tr ':/' '-' | tr '[:upper:]' '[:lower:]')"
          asset="vde-slirp-net-x86_64-${base_slug}.tar.gz"
          tag="${RELEASE_TAG:-vde-net-x86_64-${base_slug}}"
          if [[ ! "$tag" =~ ^[A-Za-z0-9._-]+$ ]]; then
            echo "::error::Resolved tag '$tag' contains characters unsafe for a git ref."
            exit 1
          fi
          title="VDE SLiRP networking toolchain · x86_64 · ${BASE_IMAGE}"
          echo "asset=$asset" >> "$GITHUB_OUTPUT"
          echo "base_slug=$base_slug" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "title=$title" >> "$GITHUB_OUTPUT"

      - name: Build toolchain
        run: |
          set -euo pipefail
          PREFIX="$GITHUB_WORKSPACE/out/vde-net"
          mkdir -p "$PREFIX"
          export CMAKE_PREFIX_PATH="$PREFIX"
          export PKG_CONFIG_PATH="$PREFIX/lib/pkgconfig"
          export CPATH="$PREFIX/include"
          export LIBRARY_PATH="$PREFIX/lib"
          export LD_LIBRARY_PATH="$PREFIX/lib"
          export PATH="$PREFIX/bin:$PATH"
          mkdir -p build && cd build

          # 1. s2argv-execs (autotools) -> libexecs, needed by vdeplug4's cmd plugin
          git clone https://github.com/rd235/s2argv-execs.git
          git -C s2argv-execs checkout "$S2ARGV_EXECS_SHA"
          ( cd s2argv-execs && autoreconf -fi && ./configure --prefix="$PREFIX" && make -j"$(nproc)" && make install )

          # 2. vdeplug4 (cmake) -> libvdeplug, vde_plug, dpipe, vdeplug_mod
          git clone https://github.com/rd235/vdeplug4.git
          git -C vdeplug4 checkout "$VDEPLUG4_SHA"
          cmake -S vdeplug4 -B vdeplug4/build -DCMAKE_INSTALL_PREFIX="$PREFIX" -DCMAKE_PREFIX_PATH="$PREFIX" -DCMAKE_INSTALL_LIBDIR=lib
          cmake --build vdeplug4/build -j"$(nproc)"
          cmake --install vdeplug4/build

          # 3. real qemu-derived libslirp, NOT conda-forge/utmapp's stale mirror
          git clone https://github.com/openSUSE/qemu-slirp.git libslirp-real
          git -C libslirp-real checkout "$LIBSLIRP_SHA"
          meson setup libslirp-real/build libslirp-real --prefix="$PREFIX" --libdir=lib
          meson compile -C libslirp-real/build
          meson install -C libslirp-real/build

          # 4. libvdeslirp (cmake) -> wraps libslirp for VDE
          git clone https://github.com/virtualsquare/libvdeslirp.git
          git -C libvdeslirp checkout "$LIBVDESLIRP_SHA"
          cmake -S libvdeslirp -B libvdeslirp/build -DCMAKE_INSTALL_PREFIX="$PREFIX" -DCMAKE_PREFIX_PATH="$PREFIX" -DCMAKE_INSTALL_LIBDIR=lib
          cmake --build libvdeslirp/build -j"$(nproc)"
          cmake --install libvdeslirp/build

          # 5. vdeplug_slirp (cmake) -> libvdeplug_slirp.so, implements the slirp:// VNL scheme
          git clone https://github.com/virtualsquare/vdeplug_slirp.git
          git -C vdeplug_slirp checkout "$VDEPLUG_SLIRP_SHA"
          cmake -S vdeplug_slirp -B vdeplug_slirp/build -DCMAKE_INSTALL_PREFIX="$PREFIX" -DCMAKE_PREFIX_PATH="$PREFIX" -DCMAKE_INSTALL_LIBDIR=lib
          cmake --build vdeplug_slirp/build -j"$(nproc)"
          cmake --install vdeplug_slirp/build

          echo "vde_plug resolved to: $(command -v vde_plug)"
          vde_plug --help >/dev/null 2>&1 || true

      - name: Package release tarball
        run: |
          set -euo pipefail
          cd out
          tar -czf "${{ steps.metadata.outputs.asset }}" vde-net
          sha256sum "${{ steps.metadata.outputs.asset }}" > vde-slirp-net.sha256

          cat > release-notes.md <<EOF
          # ${{ steps.metadata.outputs.title }}

          Relocatable VDE + SLiRP networking toolchain for UML's vector driver
          (\`vec0:transport=vde,vnl=slirp://\`). Built from pinned upstream commits:

          - s2argv-execs: \`$S2ARGV_EXECS_SHA\`
          - vdeplug4: \`$VDEPLUG4_SHA\`
          - libslirp (openSUSE/qemu-slirp mirror, v4.7.0): \`$LIBSLIRP_SHA\`
          - libvdeslirp: \`$LIBVDESLIRP_SHA\`
          - vdeplug_slirp: \`$VDEPLUG_SLIRP_SHA\`

          ## Install

          \`\`\`bash
          mkdir -p ~/vde-net
          curl -Ls -o vde-net.tar.gz \\
            https://github.com/${{ github.repository }}/releases/download/${{ steps.metadata.outputs.tag }}/${{ steps.metadata.outputs.asset }}
          tar -xzf vde-net.tar.gz -C ~/vde-net --strip-components=1

          export PATH="\$HOME/vde-net/bin:\$PATH"
          export LD_LIBRARY_PATH="\$HOME/vde-net/lib:\$LD_LIBRARY_PATH"

          ~/linux-fuse.um mem=2G rootfstype=hostfs rootflags=/ rw init=/bin/bash 'vec0:transport=vde,vnl=slirp://'
          \`\`\`

          The vector driver names the interface \`vec0\`, not \`eth0\`; \`eth0=...\`
          on the kernel command line is the removed legacy \`uml_net\` syntax and
          is silently ignored. Bring it up with the standard SLiRP defaults
          (gateway/DNS at 10.0.2.2/10.0.2.3). \`ip\` may not be installed in a
          minimal guest, \`ifconfig\`/\`route\` (net-tools) are used instead:

          \`\`\`bash
          ifconfig lo up
          ifconfig vec0 10.0.2.15 netmask 255.255.255.0 up
          route add default gw 10.0.2.2 vec0
          \`\`\`

          hostfs enforces the real host user's file permissions even for
          guest-root, so writing \`/etc/resolv.conf\` directly usually fails with
          \`Permission denied\` if it is not owned by that user. Bind-mount a
          writable copy over it instead:

          \`\`\`bash
          mkdir -p /tmp
          printf 'nameserver 10.0.2.3\\n' > /tmp/resolv.conf
          mount --bind /tmp/resolv.conf /etc/resolv.conf
          \`\`\`
          EOF

      - name: Upload staged release files
        uses: actions/upload-artifact@v4
        with:
          name: vde-net-release-${{ github.run_id }}
          path: |
            out/${{ steps.metadata.outputs.asset }}
            out/vde-slirp-net.sha256
            out/release-notes.md
          if-no-files-found: error
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    env:
      ASSET: ${{ needs.build.outputs.asset }}
      GH_TOKEN: ${{ github.token }}
      TAG: ${{ needs.build.outputs.tag }}
      TITLE: ${{ needs.build.outputs.title }}

    steps:
      - name: Download staged release files
        uses: actions/download-artifact@v4
        with:
          name: vde-net-release-${{ github.run_id }}
          path: release

      - name: Publish immutable GitHub Release
        run: |
          set -euo pipefail
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "::error::Release $TAG already exists. Set release_tag for a custom rebuild."
            exit 1
          fi

          gh release create "$TAG" \
            "release/$ASSET#$ASSET" \
            "release/vde-slirp-net.sha256#vde-slirp-net.sha256" \
            "release/release-notes.md#release-notes.md" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "$TITLE" \
            --notes-file release/release-notes.md
